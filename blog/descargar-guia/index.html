<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="refresh" content="0; url=https://raw.githubusercontent.com/victorwangye/recursos_404/main/Guía_de_aprendizaje.pdf">
    <title>Descargando Guía de Aprendizaje - Mentes404</title>
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f4f4f4;
            text-align: center;
        }
        .container {
            padding: 20px;
            background: white;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3498db;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 10px auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        a { color: #3498db; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Tu descarga está comenzando...</h2>
        <div class="loader"></div>
        <p>Si la descarga no se inicia automáticamente, 
           <a href="https://raw.githubusercontent.com/victorwangye/recursos_404/main/Guía_de_aprendizaje.pdf" download="Guia_Aprendizaje_Mentes404.pdf">haz clic aquí</a>.
        </p>
    </div>

    <script>
        // Forzar la descarga al cargar la página
        window.onload = function() {
            window.location.href = "https://raw.githubusercontent.com/victorwangye/recursos_404/main/Guía_de_aprendizaje.pdf";
        };
    </script>
</body>
</html>
